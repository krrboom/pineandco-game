<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BOTTOMS UP — PINE & CO</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{
    font-family:'Press Start 2P', monospace;
    background-color:#0d0f0c;
    background-image:
      radial-gradient(circle at 50% 18%, rgba(111,207,143,.12), transparent 60%),
      linear-gradient(rgba(13,15,12,.9), rgba(11,13,10,.93)),
      url('assets/bg_logo.png');
    background-size:cover, cover, 76px auto;
    background-repeat:no-repeat, no-repeat, repeat;
    image-rendering:pixelated;
    color:#e8efe2; overflow:hidden; touch-action:none;
  }

  /* ===== 게임 고르기 화면 ===== */
  #choose{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:clamp(22px,5vh,46px); padding:24px;
  }
  #choose.hidden{ display:none; }
  .header{ display:flex; flex-direction:column; align-items:center; gap:clamp(10px,2.4vh,22px);
    animation:bob 3.6s ease-in-out infinite; }
  .hub-logo{ width:clamp(230px,62vw,380px); height:auto; image-rendering:pixelated;
    filter:drop-shadow(3px 4px 0 rgba(0,0,0,.6)) drop-shadow(0 0 22px rgba(255,170,80,.30)); }
  .hub-cyg{ width:clamp(250px,68vw,420px); height:auto; image-rendering:pixelated;
    filter:drop-shadow(2px 3px 0 rgba(0,0,0,.55)); }
  @keyframes bob{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  .games{ display:flex; flex-direction:column; align-items:center; gap:clamp(16px,3.4vh,30px); width:100%; }
  .gamebtn{ background:none; border:0; padding:0; cursor:pointer; display:block; transition:transform .06s; }
  .gamebtn:active{ transform:translateY(3px) scale(.98); }
  .gamebtn img{
    width:clamp(230px,66vw,360px); height:auto; image-rendering:pixelated; display:block;
    filter:drop-shadow(3px 4px 0 rgba(0,0,0,.55));
  }
  .gamebtn:hover img{ filter:drop-shadow(3px 4px 0 rgba(0,0,0,.55)) drop-shadow(0 0 14px rgba(111,207,143,.7)); }
  .glabel{ margin-top:7px; font-size:8px; color:#8fb89a; letter-spacing:1px; line-height:1.6; }

  /* ===== 게임 플레이 화면 (iframe) ===== */
  #player{ position:absolute; inset:0; display:none; background:#0d0b1a; }
  #player.show{ display:block; }
  #gameFrame{ width:100%; height:100%; border:0; display:block; }
  #backBtn{
    position:fixed; top:10px; left:12px; z-index:50;
    font-family:inherit; font-size:9px; color:#0d0f0c; background:#a9d9b8;
    border:none; padding:11px 14px; cursor:pointer; box-shadow:3px 3px 0 #1c2a1e;
    letter-spacing:1px;
  }
  #backBtn:active{ transform:translate(3px,3px); box-shadow:0 0 0 #1c2a1e; }
  /* 사운드 토글 버튼 (항상 우상단) */
  #soundBtn{
    position:fixed; top:10px; right:12px; z-index:60;
    font-family:inherit; font-size:13px; color:#0d0f0c; background:#a9d9b8;
    border:none; padding:10px 12px; cursor:pointer; box-shadow:3px 3px 0 #1c2a1e; line-height:1;
  }
  #soundBtn:active{ transform:translate(3px,3px); box-shadow:0 0 0 #1c2a1e; }
  #soundBtn.off{ background:#7a5c5c; color:#f0e0e0; }
</style>
</head>
<body>

  <!-- 사운드 ON/OFF (미니게임 효과음 + Bottoms Up 음악) -->
  <button id="soundBtn" onclick="toggleSound()" aria-label="Sound">🔊</button>

  <!-- 게임 고르기 -->
  <div id="choose">
    <div class="header">
      <img class="hub-logo" src="assets/hub_logo.png" alt="BOTTOMS UP">
      <img class="hub-cyg" src="assets/hub_cyg.png" alt="CHOOSE YOUR GAME">
    </div>
    <div class="games">
      <button class="gamebtn" onclick="openGame('../dentist/index.html')">
        <img src="assets/btn_lucky.png" alt="LUCKY TOOTH">
      </button>
      <button class="gamebtn" onclick="openGame('bottle/index.html')">
        <img src="assets/btn_bottle.png" alt="BOTTLE OF FATE">
      </button>
    </div>
  </div>

  <!-- 게임 플레이 -->
  <div id="player">
    <button id="backBtn" onclick="backToChoose()">&#9664; GAMES</button>
    <iframe id="gameFrame" title="game" src="about:blank"></iframe>
  </div>

<script>
  var frame = document.getElementById('gameFrame');
  // ===== 사운드 ON/OFF (같은 오리진 localStorage 공유 → 미니게임이 읽음) + 부모(메인게임) 음악 제어 =====
  function buMuted(){ try{ return localStorage.getItem('buMuted')==='1'; }catch(e){ return false; } }
  function applySoundIcon(){ var b=document.getElementById('soundBtn'); if(!b) return;
    var m=buMuted(); b.textContent=m?'🔇':'🔊'; b.classList.toggle('off',m); }
  function applyMuteToChild(){ try{ var w=frame.contentWindow, doc=frame.contentDocument, m=buMuted();
    if(doc) doc.querySelectorAll('audio,video').forEach(function(a){ a.muted=m; });
    if(w && typeof w.__buApplyMute==='function') w.__buApplyMute(m);   // 게임이 제공한 훅(있으면)
  }catch(e){} }
  function toggleSound(){ var m=!buMuted();
    try{ localStorage.setItem('buMuted', m?'1':'0'); }catch(e){}
    applySoundIcon(); applyMuteToChild();
    try{ window.parent.postMessage({type:'buMute', muted:m}, '*'); }catch(e){}   // 메인게임 Bottoms Up 음악도 음소거
  }
  applySoundIcon();
  frame.addEventListener('load', applyMuteToChild);   // 미니게임 로드될 때마다 현재 설정 반영
  function openGame(src){
    frame.setAttribute('src', src);
    document.getElementById('choose').classList.add('hidden');
    document.getElementById('player').classList.add('show');
  }
  function backToChoose(){
    document.getElementById('player').classList.remove('show');
    document.getElementById('choose').classList.remove('hidden');
    frame.setAttribute('src','about:blank'); // 초기화
  }
  // 게임 안에서 ESC → 게임 고르기로
  addEventListener('keydown', function(e){
    if(e.key==='Escape' && document.getElementById('player').classList.contains('show')){
      backToChoose();
    }
  });
</script>
</body>
</html>
